<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Holiday Plan | Sign up</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body class="auth-page auth-signup">

  <video class="bg-video" autoplay muted loop playsinline>
    <source src="https://www.pexels.com/download/video/7385122/" type="video/mp4">
  </video>

  <main class="auth-card signup-card">
    <h1>Sign up</h1>

    <form id="signupForm" class="auth-form">
      <input type="text" name="name" placeholder="Name" autocomplete="name" required>
      <input type="email" name="email" placeholder="Email" autocomplete="email" required>
      <input type="password" name="password" placeholder="Password" autocomplete="new-password" required>
      <input type="password" name="confirmPassword" placeholder="Confirm password" autocomplete="new-password" required>

      <p class="form-message" id="signupMessage" aria-live="polite"></p>

      <button type="submit">Submit</button>
    </form>

    <p>Already have an account? <a href="index.html">Sign in</a></p>
  </main>

  <script src="app.js"></script>
</body>
</html>
